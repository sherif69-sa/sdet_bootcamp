stages:
  - validate
  - test
  - package

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

default:
  image: python:3.11
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .venv/
      - .cache/pip/

lint:
  stage: validate
  script:
    - bash scripts/bootstrap.sh
    - . .venv/bin/activate
    - bash quality.sh lint
    - bash quality.sh type
    - python -m pytest -q tests/test_gate_fast.py tests/test_ci_validate_templates.py

integration-matrix:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11"]
  image: python:${PYTHON_VERSION}
  script:
    - bash scripts/bootstrap.sh
    - . .venv/bin/activate
    - python -m sdetkit gate fast --format json --no-pytest

package-evidence:
  stage: package
  script:
    - bash scripts/bootstrap.sh
    - . .venv/bin/activate
    - python -m sdetkit doctor --format json
    - python scripts/check_repo_layout.py
    - bash security.sh
  artifacts:
    when: always
    paths:
      - docs/artifacts/
      - build/security.sarif
