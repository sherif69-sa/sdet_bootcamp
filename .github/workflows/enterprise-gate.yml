name: Enterprise Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        id: checkout_merge
        continue-on-error: true

      - name: Checkout PR head (fallback)
        if: steps.checkout_merge.outcome != 'success' && github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Doctor
        run: |
          sdetkit doctor --all

      - name: Repo check (enterprise)
        run: |
          rm -rf .sdetkit/cache .sdetkit/ops-artifacts sdet_check.json
          sdetkit repo check . --profile enterprise --format json > sdet_check.json
          python -c "import json; d=json.load(open('sdet_check.json','r',encoding='utf-8')); f=d.get('findings', []); (_ for _ in ()).throw(SystemExit(f'enterprise gate failed: findings={len(f)}')) if f else print('enterprise gate ok: findings=0')"

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sdet_check
          path: sdet_check.json
