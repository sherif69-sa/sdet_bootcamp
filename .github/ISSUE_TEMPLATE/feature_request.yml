name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List objective conditions for done.
      placeholder: |
        - [ ] Command/UX behavior is documented.
        - [ ] Tests cover the primary and error path.
        - [ ] Backward compatibility is maintained or migration notes are provided.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (critical)
        - P1 (high)
        - P2 (normal)
        - P3 (nice-to-have)
    validations:
      required: true

  - type: input
    id: ownership
    attributes:
      label: Ownership
      description: Who will own or sponsor this request?
      placeholder: "@username or team"
    validations:
      required: true


  - type: checkboxes
    id: contributor-path
    attributes:
      label: Contribution path
      description: Mark this if you are proposing starter-sized work.
      options:
        - label: This is scoped as a first contribution (small, reviewable in one PR).
          required: false

  - type: textarea
    id: starter-scope
    attributes:
      label: Starter scope (for small contributions)
      description: If this is first-contribution sized, describe a narrow scope and touched areas.
      placeholder: |
        - Expected size: one workflow or small file group
        - Planned files/areas:
        - Out of scope:
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives you've considered?
    validations:
      required: false
